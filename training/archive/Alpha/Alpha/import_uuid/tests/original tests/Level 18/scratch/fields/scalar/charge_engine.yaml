name: "Charge Field Engine"
description: |
  Calculates electrostatic scalar fields using Coulomb's inverse square law. 
  Configurable to simulate electric charge interactions.
parameters:
  magnitude: 8.9875517923e9   # Coulomb constant (k) in N⋅m²⋅C⁻²
  falloff_exponent: 2.0       # Inverse square law exponent
engine:
  operator: "inverse_square_operator"  # Reference to the associated operator
  function: "standard_edge"            # Function type
  mode: "scalar"                       # Scalar field computation
  inputs:
    - position        # Positions of vertices (pos tensor)
  outputs:
    - force     # Scalar electrostatic field contributions
