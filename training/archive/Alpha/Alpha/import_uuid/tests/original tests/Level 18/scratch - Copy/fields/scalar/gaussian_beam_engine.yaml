name: "Gaussian Beam Engine"
description: |
  Models a Gaussian beam field for laser-like falloff.
  Suitable for approximating tightly focused laser beams.
parameters:
  magnitude: 1.0              # Beam intensity at the origin
  beam_waist: 0.01            # Beam waist size (m)
  wavelength: 532e-9          # Wavelength in meters (e.g., green laser: 532 nm)
engine:
  operator: "gaussian_beam_operator"   # Reference to the associated operator
  function: "standard_edge"            # Function type
  mode: "scalar"                       # Scalar field computation
  inputs:
    - "position"
  outputs:
    - "lumen"
    - "temperature"