name: "Mass Field Engine"
description: |
  Calculates gravitational scalar fields using the inverse square law. 
  Configurable to simulate gravity and general mass-related interactions.
parameters:
  magnitude: 6.67430e-11    # Gravitational constant (G) in m^3⋅kg^−1⋅s^−2
  falloff_exponent: 2.0     # Inverse square law exponent
engine:
  operator: "inverse_square_operator"  # Reference to the associated operator
  function: "standard_edge"            # Function type
  mode: "scalar"                       # Scalar field computation
  inputs:
    - position       # Positions of vertices (pos tensor)
  outputs:
    - force    # Scalar gravitational field contributions
