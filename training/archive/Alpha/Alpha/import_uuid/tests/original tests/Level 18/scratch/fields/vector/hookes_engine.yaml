name: "Hooke's Spring Engine"
description: |
  Computes spring forces based on Hooke's Law for vertex pairs (edges). 
  Forces are vector quantities determined by displacements from rest lengths 
  and spring constants. Supports optional damping for energy dissipation.

parameters:
  rest_length: 1.0                 # Default spring rest length (scalar)
  spring_constant: 10.0            # Spring stiffness constant (scalar)
  damping_coefficient: 0.1         # Optional damping term for energy dissipation
engine:
  operator: "hookes_operator"      # Reference to the associated operator
  function: "standard_edge"        # Operates on vertex pairs (edges)
  mode: "vector"
  inputs:              # Fields this operator depends on
    - "position"                   # Vertex positions
    - "velocity"                   # Optional: vertex velocities for damping
  outputs:                   # Fields this operator updates
    - "force"                      # Force vectors applied to vertices
